version: '3'

vars:
  BINARY: gavel

tasks:
  default:
    cmds:
      - task: build

  # Build binary for current platform (local development)
  build:
    desc: Build gavel binary for current platform
    deps: [generate]
    cmds:
      - mkdir -p dist
      - |
        CGO_ENABLED=1 go build \
          -ldflags="-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" \
          -o dist/gavel{{.EXT}} \
          ./cmd/gavel
    vars:
      VERSION:
        sh: git describe --tags --always --dirty
      COMMIT:
        sh: git rev-parse HEAD
      DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      EXT:
        sh: '[ "$(go env GOOS)" = "windows" ] && echo ".exe" || echo ""'

  # Build release binaries for current platform (all architectures)
  build:release:
    desc: Build release binaries for current OS (amd64 + arm64)
    deps: [generate]
    cmds:
      - mkdir -p dist
      - task: build:release:arch
        vars: {ARCH: amd64}
      - task: build:release:arch
        vars: {ARCH: arm64}

  build:release:arch:
    internal: true
    cmds:
      - |
        CGO_ENABLED=1 GOOS={{.GOOS}} GOARCH={{.ARCH}} CC={{.CC}} go build \
          -ldflags="-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" \
          -o dist/gavel_{{.OS_TITLE}}_{{.ARCH_NAME}}{{.EXT}} \
          ./cmd/gavel
      - |
        cd dist && tar -czf gavel_{{.VERSION}}_{{.OS_TITLE}}_{{.ARCH_NAME}}.tar.gz \
          gavel_{{.OS_TITLE}}_{{.ARCH_NAME}}{{.EXT}}
      - cd dist && shasum -a 256 gavel_{{.VERSION}}_{{.OS_TITLE}}_{{.ARCH_NAME}}.tar.gz >> checksums.txt
    vars:
      VERSION:
        sh: git describe --tags --always --dirty
      COMMIT:
        sh: git rev-parse HEAD
      DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      GOOS:
        sh: go env GOOS
      OS_TITLE:
        sh: '[ "$(go env GOOS)" = "darwin" ] && echo "Darwin" || echo "Linux"'
      ARCH_NAME:
        sh: '[ "{{.ARCH}}" = "amd64" ] && echo "x86_64" || echo "{{.ARCH}}"'
      EXT:
        sh: '[ "$(go env GOOS)" = "windows" ] && echo ".exe" || echo ""'
      CC:
        sh: |
          if [ "$(go env GOOS)" = "linux" ] && [ "{{.ARCH}}" = "arm64" ]; then
            echo "aarch64-linux-gnu-gcc"
          else
            echo "gcc"
          fi

  check:cross:
    desc: Cross-compile release targets for current OS (compile-only, no archiving)
    deps: [generate]
    cmds:
      - task: check:cross:arch
        vars: {ARCH: amd64}
      - task: check:cross:arch
        vars: {ARCH: arm64}

  check:cross:arch:
    internal: true
    cmds:
      - |
        CGO_ENABLED=1 GOOS={{.GOOS}} GOARCH={{.ARCH}} CC={{.CC}} go build \
          -o /dev/null \
          ./cmd/gavel
    vars:
      GOOS:
        sh: go env GOOS
      CC:
        sh: |
          if [ "$(go env GOOS)" = "linux" ] && [ "{{.ARCH}}" = "arm64" ]; then
            echo "aarch64-linux-gnu-gcc"
          else
            echo "gcc"
          fi

  check:
    desc: Run all CI checks locally (generate, lint, test, cross-compile)
    deps: [generate]
    cmds:
      - task: lint
      - task: test
      - task: check:cross

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v

  test:perf:
    desc: Run performance tests
    cmds:
      - go test ./internal/analyzer/ -run "Performance" -v

  bench:
    desc: Run all benchmarks
    cmds:
      - go test ./internal/analyzer/ -run "^$" -bench=. -benchmem

  bench:short:
    desc: Run quick benchmarks (shorter duration)
    cmds:
      - go test ./internal/analyzer/ -run "^$" -bench=. -benchmem -benchtime=100ms

  test:perf:ollama:
    desc: Run Ollama provider performance tests (requires local Ollama)
    cmds:
      - GAVEL_PROVIDER_PERF=1 go test ./internal/analyzer/ -run "Ollama" -v -timeout 30m

  test:metrics:
    desc: Run metrics package tests
    cmds:
      - go test ./internal/metrics/ -v

  bench:metrics:
    desc: Run metrics package benchmarks
    cmds:
      - go test ./internal/metrics/ -run "^$" -bench=. -benchmem

  test:cache:
    desc: Run cache package tests
    cmds:
      - go test ./internal/cache/ -v

  bench:cache:
    desc: Run cache and pipeline benchmarks
    cmds:
      - go test ./internal/cache/ -run "^$" -bench=. -benchmem

  generate:
    cmds:
      - baml-cli generate

  lint:
    cmds:
      - go vet ./...

  release:
    desc: "Cut a new release tag (usage: task release VERSION=v0.1.0)"
    vars:
      VERSION: '{{.VERSION | default ""}}'
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required (e.g., task release VERSION=v0.1.0)"
      - sh: 'echo "{{.VERSION}}" | grep -qE "^v[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "VERSION must follow semver format with v prefix (e.g., v0.1.0)"
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: "Working directory must be clean before creating a release"
    cmds:
      - echo "Running tests before creating tag {{.VERSION}}..."
      - task: test
      - echo "Creating and pushing tag {{.VERSION}}..."
      - git tag -a {{.VERSION}} -m "Release {{.VERSION}}"
      - git push origin {{.VERSION}}
      - echo "✓ Tag {{.VERSION}} created and pushed. GitHub Actions will build the release."

  release:dry-run:
    desc: Rehearse the release pipeline locally without tagging, pushing, or creating a release
    cmds:
      - rm -rf dist
      - mkdir -p dist
      - echo "==> Running tests..."
      - task: test
      - echo "==> Building release binaries for current OS..."
      - task: build:release
      - |
        echo "==> Smoke testing native binary..."
        case "$(uname -s)" in
          Linux) OS=Linux ;;
          Darwin) OS=Darwin ;;
          *) echo "Unsupported OS: $(uname -s)" >&2; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64) ARCH=x86_64 ;;
          arm64|aarch64) ARCH=arm64 ;;
          *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
        esac
        BIN="dist/gavel_${OS}_${ARCH}"
        echo "Running ${BIN} --version"
        "${BIN}" --version
      - |
        echo "==> Generating changelog..."
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREV_TAG" ]; then
          echo "## Changes since $PREV_TAG" > dist/CHANGELOG.md
          echo "" >> dist/CHANGELOG.md
          git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges >> dist/CHANGELOG.md
        else
          echo "## Initial Release" > dist/CHANGELOG.md
        fi
      - |
        echo ""
        echo "==> Dry-run complete. Artifacts in dist/:"
        ls -lh dist/
        echo ""
        echo "==> Checksums:"
        cat dist/checksums.txt
        echo ""
        echo "==> Changelog:"
        cat dist/CHANGELOG.md
        echo ""
        VERSION=$(git describe --tags --always --dirty)
        echo "==> Would run:"
        echo "    gh release create $VERSION \\"
        echo "      --title \"Gavel $VERSION\" \\"
        echo "      --notes-file dist/CHANGELOG.md \\"
        echo "      dist/*.tar.gz \\"
        echo "      dist/checksums.txt"

  bench:build:
    desc: Build gavel-bench binary
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=1 go build -o dist/gavel-bench ./cmd/gavel-bench

  bench:run:
    desc: Run benchmark suite against corpus
    deps: [bench:build]
    cmds:
      - ./dist/gavel-bench run {{.CLI_ARGS}}

  analyze:
    desc: "Use gavel to analyze Gavel's code with current settings"
    deps: [build]
    cmds:
      - ./dist/gavel analyze --dir ./internal/
