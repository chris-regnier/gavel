name: Benchmark

on:
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of iterations per case'
        required: false
        default: '3'
      persona:
        description: 'Persona to use'
        required: false
        default: 'code-reviewer'
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install pinned dev tools
        uses: ./.github/actions/install-tools

      - name: Generate BAML client
        run: baml-cli generate

      - name: Build gavel-bench
        run: CGO_ENABLED=1 go build -o dist/gavel-bench ./cmd/gavel-bench

      - name: Run benchmark
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RUNS=${{ github.event.inputs.runs || '3' }}
          PERSONA=${{ github.event.inputs.persona || 'code-reviewer' }}
          ./dist/gavel-bench run \
            --corpus benchmarks/corpus \
            --runs "$RUNS" \
            --persona "$PERSONA" \
            --output benchmarks/results/latest.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/latest.json
          retention-days: 90

      - name: Compare with previous (if exists)
        continue-on-error: true
        run: |
          if [ -f benchmarks/results/baseline.json ]; then
            ./dist/gavel-bench compare benchmarks/results/baseline.json benchmarks/results/latest.json
          else
            echo "No baseline found, skipping comparison"
          fi

      - name: Push metrics to OTLP (if configured)
        if: env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          GAVEL_TELEMETRY_ENABLED: 'true'
        run: |
          ./dist/gavel-bench run \
            --corpus benchmarks/corpus \
            --runs 1 \
            --output /dev/null
