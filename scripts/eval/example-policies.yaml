# Example policies.yaml for A/B evaluation experiments.
#
# Copy this file to <eval-dir>/.gavel/policies.yaml and configure
# the provider section for your LLM backend before running experiments.
#
# The run-experiment.sh script toggles strict_filter between true/false
# via sed, so the initial value here doesn't matter.

provider:
  name: ollama
  ollama:
    model: qwen2.5-coder:7b
    base_url: http://localhost:11434/v1

# This field is toggled by run-experiment.sh during A/B runs.
strict_filter: true

# Use a single broad policy for evaluation to maximize signal.
# More specific policies can be added for targeted experiments.
policies:
  shall-be-merged:
    enabled: true
    severity: error
    instruction: "Shall this code be blocked from merging? Flag code that is risky, sloppy, untested, hard to understand, or unnecessarily complex."
