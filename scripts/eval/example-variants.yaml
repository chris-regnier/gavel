# Example harness configuration for comparing analysis variants.
#
# This file defines multiple variants to compare against each other,
# allowing systematic evaluation of prompts, personas, policies, and other parameters.
#
# Usage:
#   gavel harness run variants.yaml
#   gavel harness summarize experiment-results.jsonl --baseline baseline

# Number of runs per variant (default: 3). More runs smooth out LLM variance.
runs: 3

# Optional: name of the baseline variant for delta calculations
baseline: baseline

# ============================================================
# Option 1: Local packages (same as before)
# ============================================================
# packages:
#   - internal/mcp
#   - internal/evaluator
#   - internal/store

# ============================================================
# Option 2: External repositories (NEW!)
# ============================================================
# Clone and analyze external repositories. Useful for:
# - Calibrating Gavel against known vulnerable codebases
# - Testing security persona on deliberately insecure apps
# - Comparing analysis quality across different codebases

# External repositories to clone (cached locally)
repos:
  - name: juice-shop
    url: https://github.com/juice-shop/juice-shop
    branch: master
    # commit: abc123  # Pin to specific commit for reproducibility
    # depth: 1        # Default: shallow clone (depth=1)

# Analysis targets - can be local paths or reference cloned repos
targets:
  # External repo with specific subdirectories
  - repo: juice-shop
    paths:
      - server
      - frontend/src/app

  # Or analyze entire repo:
  # - repo: juice-shop

  # Mix with local paths:
  # - path: internal/mcp

# ============================================================
# Variant definitions
# ============================================================
variants:
  # Baseline: standard configuration
  - name: baseline
    description: "Standard security persona with strict filter"
    persona: security
    strict_filter: true

  # Filter comparison: same baseline but with filter disabled
  - name: filter_off
    description: "Security persona without strict filter"
    persona: security
    strict_filter: false

  # Persona comparison: code-reviewer (different focus)
  - name: code_reviewer
    description: "Code reviewer persona (general purpose)"
    persona: code-reviewer
    strict_filter: true

  # Model comparison: different model with same config
  - name: bigger_model
    description: "Larger model for better analysis quality"
    persona: security
    provider:
      name: ollama
      ollama:
        model: qwen2.5-coder:14b

  # Policy experiment: OWASP-focused security policy
  - name: owasp_focused
    description: "OWASP Top 10 focused security analysis"
    persona: security
    strict_filter: true
    policies:
      owasp-injection:
        enabled: true
        severity: error
        instruction: "Flag all SQL injection, XSS, and command injection vulnerabilities. Check user input handling, query construction, and output encoding."
      owasp-auth:
        enabled: true
        severity: error
        instruction: "Flag authentication and session management issues. Check password handling, session tokens, and access controls."
